<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國旗儀式調速中心</title>
    
    <style>
        /* CSS 樣式與佈局與上次的版本大部分相同 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('background.jpg'); 
            background-size: 130%; 
            background-position: center 30%; 
            background-attachment: fixed; 
            color: #fff; 
            text-shadow: 1px 1px 2px #000;
        }

        #ceremony-container {
            position: absolute; 
            top: 55%; 
            left: 50%; 
            transform: translateX(-50%); 
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #flag-pole {
            width: 12px; 
            height: 350px; 
            background-color: #333;
            position: relative; 
            margin-left: 158px; 
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        #flag-container {
            position: absolute;
            top: 100%; 
            left: -150px; 
            width: 150px; 
            height: 100px; 
            /* ⚠️ 讓 JS 來控制 transition duration */
            transition: transform 0s ease-in-out; 
            /* 旗幟預設在底部，transform: translateY(0) */
            transform: translateY(0);
        }
        
        /* 🚩 【刪除 .raised 樣式】: 讓 JS 處理 transform 距離，以便微調 */

        #flag-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5); 
            border: 1px solid #fff; 
            transform: none; 
        }
        
        /* ... (控制面板和提示樣式不變) ... */

        .controls { 
            position: fixed; 
            top: 20px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; 

            display: flex; 
            gap: 15px; 
            background-color: rgba(0, 0, 0, 0.6); 
            padding: 15px;
            border-radius: 10px;
        }
        .tip { 
            position: fixed;
            top: 80px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            
            font-size: 14px; 
            text-align: center; 
            background-color: rgba(0, 0, 0, 0.5); 
            padding: 5px 10px; 
            border-radius: 5px;
        }
        .loading { color: orange; font-weight: bold; }
        .ready { color: #aaffaa; font-weight: bold; }
        
        button {
            padding: 12px 25px; 
            font-size: 18px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px;
            transition: background-color 0.3s, opacity 0.3s;
        }

        #flag-selector, #speed-selector {
            padding: 12px 10px;
            font-size: 18px;
            border-radius: 8px;
            background-color: #555;
            color: white;
            border: 1px solid #777;
            cursor: pointer;
            min-width: 80px; 
        }

        #flag-selector {
            min-width: 150px; 
        }

        #raise-btn { background-color: #28a745; color: white; }
        #raise-btn:hover:not(:disabled) { background-color: #1e7e34; }
        #lower-btn { background-color: #dc3545; color: white; }
        #lower-btn:hover:not(:disabled) { background-color: #bd2130; }
        
        button:disabled { 
            background-color: #6c757d; 
            cursor: not-allowed; 
            opacity: 0.6; 
        }
    </style>
</head>
<body>

    <audio id="flag-anthem-audio">
        <source src="anthem.mp3" type="audio/mpeg">
    </audio>

    <div id="ceremony-container">
        <div id="flag-pole">
            <div id="flag-container">
                <img id="flag-image" src="wf.png" alt="wf.png">
            </div>
        </div>
    </div>

    <div class="controls">
        <select id="flag-selector">
            <option value="wf.png" selected>wf.png</option>
            <option value="tw.png">tw.png</option>
            <option value="cn.png">cn.png</option>
            <option value="jp.png">jp.png</option>
            <option value="kr.png">kr.png</option>
            <option value="sg.png">sg.png</option>
            <option value="in.png">in.png</option>
            <option value="th.png">th.png</option>
            <option value="vn.png">vn.png</option>
            <option value="my.png">my.png</option>
            <option value="ph.png">ph.png</option>
            <option value="sa.png">sa.png</option>
            <option value="ae.png">ae.png</option>
            <option value="kz.png">kz.png</option>
        </select>
        
        <select id="speed-selector">
            <option value="0.5">x0.5</option>
            <option value="1.0" selected>x1.0 (原速)</option>
            <option value="1.25">x1.25</option>
            <option value="1.75">x1.75</option>
            <option value="2.0">x2.0</option>
        </select>

        <button id="raise-btn" disabled>🚀 升旗</button>
        <button id="lower-btn" disabled>🔽 降旗</button>
    </div>
    
    <div class="tip">
        <p id="status-message" class="loading">正在初始化儀式參數...</p>
    </div>
    
    <script>
        // 🚨 【關鍵變數 1】這裡設定國旗歌的標準長度（秒）。
        const STANDARD_ANTHEM_DURATION = 49.3; 
        
        // 🚩 【關鍵變數 2】這裡設定旗幟移動的距離（像素）。預設 350-100=250。
        //    如果您覺得沒到位，請微調這個數字，例如 252 或 248。
        const FLAG_MOVE_DISTANCE_PX = 250; 
        
        const flagContainer = document.getElementById('flag-container');
        const raiseBtn = document.getElementById('raise-btn');
        const lowerBtn = document.getElementById('lower-btn');
        const flagSelector = document.getElementById('flag-selector');
        const speedSelector = document.getElementById('speed-selector'); 
        const audio = document.getElementById('flag-anthem-audio');
        const statusMessage = document.getElementById('status-message');
        const flagImage = document.getElementById('flag-image');

        let isMoving = false; 
        let currentSpeed = 1.0; 
        let ceremonyDurationMs = 0; 
        let isRaised = false; // 新增狀態追蹤

        initializeCeremony();
        
        function setMovingState(state) {
            isMoving = state;
            raiseBtn.disabled = state;
            lowerBtn.disabled = state;
            flagSelector.disabled = state;
            speedSelector.disabled = state; 
        }
        
        function updateDuration() {
            currentSpeed = parseFloat(speedSelector.value);
            const newDurationSeconds = STANDARD_ANTHEM_DURATION / currentSpeed; 
            
            // 設置動畫時間
            flagContainer.style.transitionDuration = `${newDurationSeconds}s`;
            ceremonyDurationMs = newDurationSeconds * 1000;
            
            const durationDisplay = newDurationSeconds.toFixed(1);
            if (!isMoving) {
                 statusMessage.innerHTML = `✅ **準備完成！** 國旗歌原長：${STANDARD_ANTHEM_DURATION.toFixed(1)} 秒。儀式時間：**${durationDisplay} 秒** (x${currentSpeed})。`;
                 statusMessage.className = 'ready';
            }
        }
        
        function initializeCeremony() {
            if (STANDARD_ANTHEM_DURATION <= 0) {
                 statusMessage.innerHTML = '❌ **初始化失敗！** 請檢查 **STANDARD_ANTHEM_DURATION** 是否設定正確的秒數。';
                 statusMessage.className = 'loading';
                 return;
            }
            audio.load();
            updateDuration(); 
            // 確保旗幟在初始狀態（底部）
            flagContainer.style.transform = `translateY(0px)`;
            isRaised = false;
            setMovingState(false);
        }

        function handleFlagChange() {
            const pureFileName = flagSelector.value;
            flagImage.src = pureFileName; 
            
            // 換旗時，旗幟重置到底部
            flagContainer.style.transform = `translateY(0px)`;
            isRaised = false;
            
            updateDuration(); 
            
            statusMessage.innerHTML = `✅ 已切換旗幟：**${pureFileName}**。並重置到旗杆底部。`;
            statusMessage.className = 'ready';
        }
        
        function handleSpeedChange() {
             updateDuration();
             const selectedSpeedText = speedSelector.options[speedSelector.selectedIndex].text;
             statusMessage.innerHTML = `已設定速度為 **${selectedSpeedText}**。儀式時間：${(ceremonyDurationMs / 1000).toFixed(1)} 秒。`;
             statusMessage.className = 'ready';
        }

        function startCeremony() {
            if (isMoving || ceremonyDurationMs <= 0) return;
            
            setMovingState(true);

            audio.playbackRate = currentSpeed; 
            audio.currentTime = 0;
            audio.play().catch(error => {
                console.error("無法播放音訊：", error);
            });

            setTimeout(() => {
                setMovingState(false);
            }, ceremonyDurationMs);
        }

        function raiseFlag() {
            if (isRaised) return; 
            startCeremony();
            // 🚩 執行升旗動畫：使用變數設定距離
            flagContainer.style.transform = `translateY(-${FLAG_MOVE_DISTANCE_PX}px)`;
            isRaised = true;
        }

        function lowerFlag() {
            if (!isRaised) return; 
            startCeremony();
            // 🚩 執行降旗動畫：回到 0px（底部）
            flagContainer.style.transform = `translateY(0px)`;
            isRaised = false;
        }

        // 綁定事件
        raiseBtn.addEventListener('click', raiseFlag);
        lowerBtn.addEventListener('click', lowerFlag);
        flagSelector.addEventListener('change', handleFlagChange);
        speedSelector.addEventListener('change', handleSpeedChange); 
        
        // 圖片和音訊錯誤處理不變
        flagImage.addEventListener('error', (e) => {
            console.error("國旗圖片載入失敗: ", e.target.src);
            const failedFile = e.target.src.split('/').pop();
            statusMessage.innerHTML = `❌ **圖片錯誤！** 無法載入：${failedFile}。請檢查圖片檔名是否已移除 'flag_' 前綴。`;
            statusMessage.className = 'loading';
        });
        
        audio.addEventListener('error', (e) => { 
            console.error("音訊載入錯誤詳細資訊:", e);
            statusMessage.innerHTML = '⚠️ **音訊載入失敗！** 請檢查 **anthem.mp3** 檔案是否與 index.html 在同一資料夾。';
            statusMessage.className = 'ready';
        });
        
    </script>
</body>
</html>
